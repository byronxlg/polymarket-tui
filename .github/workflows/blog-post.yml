name: Daily blog post

# Writes the next blog post from docs/blog-todo.md and opens a PR for review.
# Runs Claude Code on plan (subscription) usage, not API billing: create the
# secret with a token from `claude setup-token` ->
#   gh secret set CLAUDE_CODE_OAUTH_TOKEN
# Post-only PRs are merged by the run itself (authorized by Byron,
# 2026-07-17); the PR remains as the audit trail and revert point.
on:
  schedule:
    - cron: "23 6 * * *" # daily 06:23 UTC; offset to dodge on-the-hour load
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write # claude-code-action mints its GitHub token via OIDC
  actions: write # dispatch pages.yml after merging (GITHUB_TOKEN pushes don't trigger it)

concurrency:
  group: blog-post
  cancel-in-progress: false

jobs:
  write-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write the next post
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Explicit token instead of the Claude GitHub App (not installed on
          # this repo). Known trade-off: events created with GITHUB_TOKEN do
          # not trigger other workflows - irrelevant here, no PR-triggered CI.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read .claude/skills/blog-post/SKILL.md and follow it end to end:
            find today's story by scanning both the news (headlines with a
            matching Polymarket market) and the markets (big moves, heavy
            volume), and write how the event and the market relate; on a
            quiet day fall back to the topmost unchecked topic in
            docs/blog-todo.md. Verify every fact and price against
            the live APIs at write time, write the post, sync the blog
            index, landing page, feed, sitemap, and to-do list, verify the
            links, then create branch blog/<slug>, commit as
            "Blog: <title>", push, and open a pull request.

            Then, if and only if the PR's diff is the post plus its sync files
            (site/blog/*, the landing #blog list, sitemap, docs/blog-todo.md),
            merge it: gh pr merge --squash --delete-branch, then dispatch the
            site deploy with: gh workflow run pages.yml
            (a merge made with GITHUB_TOKEN does not trigger it by itself).
            If the merge fails or the diff includes anything else, leave the
            PR open and say why.

            If an open PR whose branch starts with blog/ already exists, stop
            without writing anything and say so - one pending post at a time.
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
            --max-turns 150
